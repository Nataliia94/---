    </g>
    <text x="0" y="140" font-family="Arial, sans-serif" font-size="10" fill="#16a34a" text-anchor="middle" opacity="0.8">Сила фиксации: 80%</text>
  </g>
  <text x="240" y="240" font-family="Arial, sans-serif" font-weight="bold" font-size="16" fill="#fff" text-anchor="middle">Вакуумная присоска нового поколения</text>
  <text x="240" y="260" font-family="Arial, sans-serif" font-size="12" fill="#999" text-anchor="middle">Выдерживает до 15 кг нагрузки</text>
